name: Lighthouse CI

on:
  workflow_dispatch:
    inputs:
      target:
        description: '측정 환경'
        required: true
        default: 'prod'
        type: choice
        options:
          - local
          - prod

permissions:
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build (local)
        if: ${{ inputs.target == 'local' }}
        run: pnpm build

      - name: Run Lighthouse (local)
        if: ${{ inputs.target == 'local' }}
        env:
          LHCI_BASE_URL: http://localhost:4173
        run: pnpm exec lhci collect --config=./lighthouserc.cjs --start-server-command="pnpm preview" --start-server-ready-pattern="Local"

      - name: Run Lighthouse (prod)
        if: ${{ inputs.target == 'prod' }}
        run: pnpm exec lhci collect --config=./lighthouserc.cjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ inputs.target }}-run${{ github.run_number }}
          path: .lighthouseci/
          retention-days: 90
          include-hidden-files: true

      - name: Write Job Summary and Post PR comment
        uses: actions/github-script@v7
        if: always()
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.lighthouseci')
              .filter(f => f.startsWith('lhr-') && f.endsWith('.json'))
              .sort();
            if (!files.length) return;

            const score = v => v != null ? Math.round(v * 100) : 'N/A';
            const emoji = v => v == null ? '⚪' : v >= 0.9 ? '🟢' : v >= 0.5 ? '🟡' : '🔴';

            const rows = files.map(f => {
              const lhr = JSON.parse(fs.readFileSync(`.lighthouseci/${f}`, 'utf8'));
              const cats = lhr.categories;
              const url = new URL(lhr.finalUrl || lhr.requestedUrl);
              const page = url.pathname.replace('/festival', '') || '/';
              const perf = cats.performance?.score;
              const a11y = cats.accessibility?.score;
              const bp = cats['best-practices']?.score;
              const seo = cats.seo?.score;
              return `| \`${page}\` | ${emoji(perf)} ${score(perf)} | ${emoji(a11y)} ${score(a11y)} | ${emoji(bp)} ${score(bp)} | ${emoji(seo)} ${score(seo)} |`;
            });

            const target = '${{ inputs.target }}';
            const runId = '${{ github.run_id }}';
            const repository = '${{ github.repository }}';

            const body = [
              `## 🔦 Lighthouse 측정 결과 (\`${target}\`)`,
              '',
              '| 페이지 | Performance | Accessibility | Best Practices | SEO |',
              '|--------|-------------|---------------|----------------|-----|',
              ...rows,
              '',
              `> [리포트 다운로드](https://github.com/${repository}/actions/runs/${runId})`,
            ].join('\n');

            await core.summary.addRaw(body).write();

            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (prs.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs[0].number,
                body,
              });
            }
