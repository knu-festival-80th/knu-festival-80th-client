name: Lighthouse CI

on:
  workflow_dispatch:
    inputs:
      target:
        description: '측정 환경'
        required: true
        default: 'prod'
        type: choice
        options:
          - local
          - prod

permissions:
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build (local)
        if: ${{ inputs.target == 'local' }}
        run: pnpm build

      - name: Run Lighthouse (local)
        if: ${{ inputs.target == 'local' }}
        run: pnpm exec lhci collect --config=./lighthouserc.cjs --url=http://localhost:4173 --start-server-command="pnpm preview" --start-server-ready-pattern="Local"

      - name: Run Lighthouse (prod)
        if: ${{ inputs.target == 'prod' }}
        run: pnpm exec lhci collect --config=./lighthouserc.cjs --url=https://chcse.knu.ac.kr/festival

      - name: Debug - list output files
        if: always()
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== .lighthouseci/ ==="
          ls -la .lighthouseci/ 2>/dev/null || echo "not found"
          echo "=== find lhr-*.json ==="
          find . -name "lhr-*.json" 2>/dev/null | head -10

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ inputs.target }}-run${{ github.run_number }}
          path: .lighthouseci/
          retention-days: 90

      - name: Post PR comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.lighthouseci')
              .filter(f => f.startsWith('lhr-') && f.endsWith('.json'));
            if (!files.length) return;

            const lhr = JSON.parse(fs.readFileSync(`.lighthouseci/${files[0]}`, 'utf8'));
            const cats = lhr.categories;
            const score = v => v != null ? Math.round(v * 100) : 'N/A';
            const emoji = v => v == null ? '⚪' : v >= 0.9 ? '🟢' : v >= 0.5 ? '🟡' : '🔴';

            const target = '${{ inputs.target }}';
            const runId = '${{ github.run_id }}';
            const repository = '${{ github.repository }}';

            const body = [
              `## 🔦 Lighthouse 측정 결과 (\`${target}\`)`,
              '',
              '| 카테고리 | 점수 |',
              '|----------|------|',
              `| Performance | ${emoji(cats.performance?.score)} ${score(cats.performance?.score)} |`,
              `| Accessibility | ${emoji(cats.accessibility?.score)} ${score(cats.accessibility?.score)} |`,
              `| Best Practices | ${emoji(cats['best-practices']?.score)} ${score(cats['best-practices']?.score)} |`,
              `| SEO | ${emoji(cats.seo?.score)} ${score(cats.seo?.score)} |`,
              '',
              `> [리포트 다운로드](https://github.com/${repository}/actions/runs/${runId})`,
            ].join('\n');

            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (prs.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs[0].number,
                body,
              });
            }
